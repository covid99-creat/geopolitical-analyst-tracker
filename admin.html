<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>פירוט ההצבעות</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell admin-shell">
    <header class="site-header">
      <a class="brand" href="/" aria-label="תחזית 2026">
        <span class="brand-icon" aria-hidden="true">
          <span class="pie-mark"></span>
          <span class="trend-mark"></span>
        </span>
        <span>תחזית 2026</span>
      </a>
      <nav class="header-actions" aria-label="ניווט">
        <a href="/">חזרה לתחזית הציבור</a>
        <button id="downloadCsvBtn" class="header-cta" type="button">הורדת CSV</button>
      </nav>
    </header>

    <section class="forecast-card">
      <div class="forecast-header">
        <div>
          <p class="eyebrow">שקיפות</p>
          <h1>פירוט ההצבעות</h1>
        </div>
        <div class="forecast-meta">
          <span id="votesMeta">טוען הצבעות...</span>
        </div>
      </div>
      <p class="method-note">
        כאן אפשר לראות את כל התחזיות שנשמרו באתר. תחזיות שסומנו כאנונימיות מוצגות ללא שם.
      </p>
    </section>

    <section class="panel" id="votesPanel">
      <div class="section-title">
        <div>
          <p class="eyebrow">נתונים גולמיים</p>
          <h2 id="votesTitle">כל ההצבעות</h2>
        </div>
      </div>

      <p id="emptyVotes" class="empty-state" hidden>עדיין לא נשמרו תחזיות. ברגע שמישהו יגיש תחזית, היא תופיע כאן.</p>

      <div class="vote-table-wrap">
        <table class="vote-table admin-table">
          <thead id="adminTableHead"></thead>
          <tbody id="adminTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
