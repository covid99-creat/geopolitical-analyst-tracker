<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>פירוט ההצבעות</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell admin-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">בחירות 2026</p>
        <h1>פירוט ההצבעות</h1>
      </div>
      <a class="admin-link" href="/">חזרה לאתר</a>
    </header>

    <section class="panel">
      <div class="section-title">
        <div>
          <h2>כל תחזיות המשתמשים</h2>
          <p>כאן אפשר לראות את פירוט ההצבעות שנשמרו באתר. הצבעות שסומנו כאנונימיות מוצגות ללא שם.</p>
        </div>
        <button id="downloadCsvBtn" type="button">הורדת CSV</button>
      </div>
      <p id="storageStatus" class="admin-status"></p>
    </section>

    <section class="panel" id="votesPanel">
      <div class="section-title">
        <div>
          <h2 id="votesTitle">כל ההצבעות</h2>
          <p id="votesMeta"></p>
        </div>
      </div>

      <div class="vote-table-wrap">
        <table class="vote-table admin-table">
          <thead id="adminTableHead"></thead>
          <tbody id="adminTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
